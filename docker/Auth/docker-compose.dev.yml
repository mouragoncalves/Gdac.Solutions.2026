services:
  # Banco de dados fornecido pelo XAMPP local — não sobe container de banco em dev.

  auth-redis:
    ports:
      - "6379:6379"
    command: redis-server --requirepass dev_redis --save ""
    environment: {}

  # Servidor SMTP fake — UI em http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  # Sobrescreve o auth-api para remover a dependência do container de banco
  auth-api:
    depends_on:
      auth-redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=host.docker.internal;Port=3306;Database=gdac_auth_dev;Uid=root;Pwd=;CharSet=utf8mb4;SslMode=None;"
      Redis__ConnectionString: "auth-redis:6379,password=dev_redis"
