services:
  # Banco de dados fornecido pelo XAMPP local — não sobe container de banco em dev.

  # Servidor SMTP fake — UI em http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  onboarding-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=host.docker.internal;Port=3306;Database=gdac_onboarding_dev;Uid=root;Pwd=;CharSet=utf8mb4;SslMode=None;"
      ServiceUrls__CoreApi: http://host.docker.internal:5002/
      ServiceUrls__AuthApi: http://host.docker.internal:5001/
