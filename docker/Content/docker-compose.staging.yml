services:
  content-api:
    image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG:-staging}
    restart: on-failure:3
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__Default: "Server=mysql.gdac.com.br;Port=3306;Database=gdac05;Uid=gdac05;Pwd=${DB_STG_PASSWORD};CharSet=utf8mb4;SslMode=Preferred;"
      Jwt__Issuer: https://auth-stg.gdac.com.br
      Email__Host: smtp.kinghost.net
      Email__Port: "465"
      Email__Username: atendimento@gdac.com.br
      Email__From: atendimento@gdac.com.br
      Email__AlertTo: desenvolvimento@gdac.com.br
      Email__SslMode: SslOnConnect
