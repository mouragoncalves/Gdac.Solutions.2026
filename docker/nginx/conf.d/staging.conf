upstream auth_api {
    server auth-api:8080;
}

server {
    listen 80;
    server_name auth-staging.gdac.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name auth-staging.gdac.com.br;

    ssl_certificate     /etc/letsencrypt/live/auth-staging.gdac.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth-staging.gdac.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://auth_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
