services:
  auth-api:
    image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
    restart: on-failure:3
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=mysql.gdac.com.br;Port=3306;Database=gdac02;Uid=gdac02;Pwd=${DB_PROD_PASSWORD};CharSet=utf8mb4;SslMode=Preferred;"
      Jwt__Issuer: https://auth.gdac.com.br
      Email__BaseUrl: https://auth.gdac.com.br

  auth-redis:
    restart: always
