services:
  auth-api:
    image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=mysql.gdac.com.br;Port=3306;Database=gdac_auth;Uid=gdac;Pwd=${DB_PROD_PASSWORD};CharSet=utf8mb4;SslMode=Preferred;"

  auth-nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - auth-api

  auth-redis:
    restart: always
