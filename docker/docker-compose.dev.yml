services:
  auth-db:
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: dev_root
      MARIADB_DATABASE: gdac_auth_dev
      MARIADB_USER: gdac
      MARIADB_PASSWORD: dev_password

  auth-redis:
    ports:
      - "6379:6379"
    command: redis-server --requirepass dev_redis --save ""

  auth-api:
    build:
      context: ..
      dockerfile: Src/Gdac.Auth.Api/Dockerfile
      target: build
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=auth-db;Port=3306;Database=gdac_auth_dev;Uid=gdac;Pwd=dev_password;CharSet=utf8mb4;"
      Redis__ConnectionString: "auth-redis:6379,password=dev_redis"

  # Servidor SMTP fake para desenvolvimento
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # UI web
      - "1025:1025"   # SMTP
