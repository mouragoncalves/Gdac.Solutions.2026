name: Deploy Onboarding Staging

on:
  workflow_run:
    workflows: [CI Onboarding]
    types: [completed]
    branches: [staging]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_STG_PASSWORD: ${{ secrets.ONBOARDING_DB_STG_PASSWORD }}
          JWT_PUBLIC_KEY: ${{ secrets.AUTH_JWT_PUBLIC_KEY }}
          EMAIL_PASSWORD: ${{ secrets.ONBOARDING_EMAIL_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: DB_STG_PASSWORD,JWT_PUBLIC_KEY,EMAIL_PASSWORD,GH_TOKEN,GH_REPO
          script: |
            set -e
            REPO_DIR=/opt/gdac/onboarding-stg

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Primeira execução: clonando repositório..."
              mkdir -p "$REPO_DIR"
              git clone "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" "$REPO_DIR"
              cd "$REPO_DIR"
              git checkout staging
            fi

            cd "$REPO_DIR"
            git pull origin staging

            # ─── Nginx (usa cert emitido pelo deploy de produção) ─────────────
            if [ ! -f /etc/nginx/conf.d/onboarding-staging.conf ] && \
               [ -f /etc/letsencrypt/live/onboarding-api.gdac.com.br/fullchain.pem ]; then
              echo "Configurando nginx staging..."
              cp "$REPO_DIR/docker/Onboarding/nginx/conf.d/staging.conf" /etc/nginx/conf.d/onboarding-staging.conf
              nginx -t && systemctl reload nginx
            fi

            cat > .env << 'EOF'
            REGISTRY=ghcr.io
            IMAGE_NAME=${{ github.repository_owner }}/gdac-onboarding
            JWT_AUDIENCE=gdac-apps
            EOF

            echo "Atualizando imagem..."
            docker pull ghcr.io/${{ github.repository_owner }}/gdac-onboarding:${{ github.event.workflow_run.head_sha }}

            echo "Subindo serviços..."
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }} docker compose \
              -p gdac-onboarding-stg \
              --env-file .env \
              -f docker/Onboarding/docker-compose.yml \
              -f docker/Onboarding/docker-compose.staging.yml \
              up -d --no-build --remove-orphans

            echo "Aguardando health check..."
            if ! timeout 60 bash -c 'until curl -sf http://localhost:8087/health/ready; do sleep 3; done'; then
              echo "--- LOGS DO CONTAINER ---"
              docker logs --tail 50 gdac-onboarding-stg-onboarding-api-1 2>&1 || true
              curl -s http://localhost:8087/health/ready 2>&1 || true
              exit 1
            fi
            echo "Deploy staging Onboarding concluído."
