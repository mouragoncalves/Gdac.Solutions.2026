name: Deploy Auth Staging

on:
  workflow_run:
    workflows: [CI Auth]
    types: [completed]
    branches: [staging]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_STG_PASSWORD: ${{ secrets.AUTH_DB_STG_PASSWORD }}
          JWT_PRIVATE_KEY: ${{ secrets.AUTH_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.AUTH_JWT_PUBLIC_KEY }}
          REDIS_PASSWORD: ${{ secrets.AUTH_REDIS_STG_PASSWORD }}
          EMAIL_PASSWORD: ${{ secrets.AUTH_EMAIL_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: DB_STG_PASSWORD,JWT_PRIVATE_KEY,JWT_PUBLIC_KEY,REDIS_PASSWORD,EMAIL_PASSWORD,GH_TOKEN,GH_REPO
          script: |
            set -e
            REPO_DIR=/opt/gdac/auth-stg

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Primeira execução: clonando repositório..."
              mkdir -p "$REPO_DIR"
              git clone "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" "$REPO_DIR"
              cd "$REPO_DIR"
              git checkout staging
            fi

            cd "$REPO_DIR"
            git pull origin staging

            cat > .env << 'EOF'
            REGISTRY=ghcr.io
            IMAGE_NAME=${{ github.repository_owner }}/gdac-auth
            JWT_AUDIENCE=gdac-apps
            EOF

            echo "Atualizando imagem..."
            docker pull ghcr.io/${{ github.repository_owner }}/gdac-auth:${{ github.event.workflow_run.head_sha }}

            echo "Subindo serviços..."
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }} docker compose \
              -p gdac-auth-stg \
              --env-file .env \
              -f docker/Auth/docker-compose.yml \
              -f docker/Auth/docker-compose.staging.yml \
              up -d --no-build --remove-orphans

            echo "Aguardando health check..."
            if ! timeout 60 bash -c 'until curl -sf http://localhost:8081/health/ready; do sleep 3; done'; then
              echo "--- LOGS DO CONTAINER (últimas 50 linhas) ---"
              docker logs --tail 50 gdac-auth-stg-auth-api-1 2>&1 || true
              echo "--- HEALTH CHECK RESPONSE ---"
              curl -s http://localhost:8081/health/ready 2>&1 || true
              exit 1
            fi
            echo "Deploy staging Auth concluído."
