name: Setup Core Nginx

on:
  workflow_dispatch:

jobs:
  setup:
    name: Configure Nginx + SSL for Core
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            echo "==> Copiando configs nginx do repositório..."
            cp /opt/gdac/core/docker/Core/nginx/conf.d/production.conf /etc/nginx/conf.d/core-prod.conf
            cp /opt/gdac/core/docker/Core/nginx/conf.d/staging.conf    /etc/nginx/conf.d/core-stg.conf

            echo "==> Emitindo certificado SSL (nginx para ~2s)..."
            systemctl stop nginx
            certbot certonly \
              --standalone \
              -d core-api.gdac.com.br \
              -d core-api-stg.gdac.com.br \
              --non-interactive \
              --agree-tos \
              --email suporte@gdac.com.br
            systemctl start nginx

            echo "==> Escrevendo configs nginx finais com SSL..."
            cat > /etc/nginx/conf.d/core-prod.conf << 'NGINX'
            server {
                listen 80;
                server_name core-api.gdac.com.br;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl http2;
                server_name core-api.gdac.com.br;

                ssl_certificate     /etc/letsencrypt/live/core-api.gdac.com.br/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/core-api.gdac.com.br/privkey.pem;
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         HIGH:!aNULL:!MD5;
                ssl_session_cache   shared:SSL:10m;
                ssl_session_timeout 10m;

                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

                location / {
                    proxy_pass         http://127.0.0.1:8082;
                    proxy_http_version 1.1;
                    proxy_set_header   Connection "";
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_read_timeout 30s;
                    proxy_connect_timeout 5s;
                }

                location /health {
                    proxy_pass http://127.0.0.1:8082;
                    access_log off;
                }
            }
            NGINX

            cat > /etc/nginx/conf.d/core-stg.conf << 'NGINX'
            server {
                listen 80;
                server_name core-api-stg.gdac.com.br;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl http2;
                server_name core-api-stg.gdac.com.br;

                ssl_certificate     /etc/letsencrypt/live/core-api.gdac.com.br/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/core-api.gdac.com.br/privkey.pem;
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         HIGH:!aNULL:!MD5;
                ssl_session_cache   shared:SSL:10m;
                ssl_session_timeout 10m;

                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

                location / {
                    proxy_pass         http://127.0.0.1:8083;
                    proxy_http_version 1.1;
                    proxy_set_header   Connection "";
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_read_timeout 30s;
                    proxy_connect_timeout 5s;
                }

                location /health {
                    proxy_pass http://127.0.0.1:8083;
                    access_log off;
                }
            }
            NGINX

            echo "==> Validando e recarregando nginx..."
            nginx -t && systemctl reload nginx
            echo "Setup Core nginx concluído."
