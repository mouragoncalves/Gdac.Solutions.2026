name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gdac-auth

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: ci_root
          MARIADB_DATABASE: gdac_auth_test
          MARIADB_USER: gdac
          MARIADB_PASSWORD: ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit Tests
        run: dotnet test Tests/Gdac.Auth.UnitTests --no-build -c Release --logger "trx;LogFileName=unit-results.trx"

      - name: Integration Tests
        env:
          ConnectionStrings__Default: "Server=localhost;Port=3306;Database=gdac_auth_test;Uid=gdac;Pwd=ci_password;CharSet=utf8mb4;"
          Redis__ConnectionString: "localhost:6379"
          Jwt__PrivateKey: ${{ secrets.CI_JWT_PRIVATE_KEY }}
          Jwt__PublicKey: ${{ secrets.CI_JWT_PUBLIC_KEY }}
          Jwt__Issuer: "https://auth.gdac.com.br"
        run: dotnet test Tests/Gdac.Auth.IntegrationTests --no-build -c Release --logger "trx;LogFileName=integration-results.trx"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Src/Gdac.Auth.Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
