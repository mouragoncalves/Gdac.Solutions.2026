name: Deploy Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [staging]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_STG_PASSWORD: ${{ secrets.DB_STG_PASSWORD }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: DB_STG_PASSWORD
          script: |
            set -e
            cd /opt/gdac/auth-stg
            git pull origin staging

            echo "Atualizando imagem..."
            docker pull ghcr.io/${{ github.repository_owner }}/gdac-auth:${{ github.event.workflow_run.head_sha }}

            echo "Aplicando migrations..."
            docker run --rm \
              -e "ConnectionStrings__Default=Server=mysql.gdac.com.br;Port=3306;Database=gdac01;Uid=gdac01;Pwd=${DB_STG_PASSWORD};CharSet=utf8mb4;SslMode=Preferred;" \
              ghcr.io/${{ github.repository_owner }}/gdac-auth:${{ github.event.workflow_run.head_sha }} \
              dotnet ef database update --no-build

            echo "Subindo serviços..."
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }} docker compose \
              -f docker/docker-compose.yml \
              -f docker/docker-compose.staging.yml \
              up -d --no-build

            echo "Aguardando health check..."
            timeout 60 bash -c 'until curl -sf http://localhost:8081/health/ready; do sleep 3; done'
            echo "Deploy staging concluído."
