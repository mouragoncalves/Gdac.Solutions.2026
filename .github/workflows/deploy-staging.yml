name: Deploy Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/gdac/auth

            echo "Atualizando imagem..."
            docker pull ghcr.io/${{ github.repository_owner }}/gdac-auth:${{ github.sha }}

            echo "Aplicando migrations..."
            docker run --rm \
              --env-file .env \
              ghcr.io/${{ github.repository_owner }}/gdac-auth:${{ github.sha }} \
              dotnet ef database update --no-build

            echo "Subindo serviços..."
            IMAGE_TAG=${{ github.sha }} docker compose \
              -f docker/docker-compose.yml \
              -f docker/docker-compose.staging.yml \
              up -d --no-build

            echo "Aguardando health check..."
            timeout 60 bash -c 'until curl -sf http://localhost:8080/health/ready; do sleep 3; done'
            echo "Deploy staging concluído."
