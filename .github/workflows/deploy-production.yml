name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag da imagem para deploy (SHA do commit)'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment: production

    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DB_PROD_PASSWORD: ${{ secrets.DB_PROD_PASSWORD }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: DB_PROD_PASSWORD
          script: |
            set -e
            cd /opt/gdac/auth
            mkdir -p backups

            echo "Backup do banco antes do deploy..."
            docker run --rm mariadb:11.4 \
              mysqldump -h mysql.gdac.com.br -u gdac02 -p"${DB_PROD_PASSWORD}" gdac_auth \
              > backups/pre-deploy-$(date +%Y%m%d-%H%M%S).sql

            echo "Atualizando imagem..."
            docker pull ghcr.io/${{ github.repository_owner }}/gdac-auth:${{ steps.tag.outputs.value }}

            echo "Aplicando migrations..."
            docker run --rm \
              -e "ConnectionStrings__Default=Server=mysql.gdac.com.br;Port=3306;Database=gdac_auth;Uid=gdac02;Pwd=${DB_PROD_PASSWORD};CharSet=utf8mb4;SslMode=Preferred;" \
              --env-file .env \
              ghcr.io/${{ github.repository_owner }}/gdac-auth:${{ steps.tag.outputs.value }} \
              dotnet ef database update --no-build

            echo "Subindo serviços..."
            IMAGE_TAG=${{ steps.tag.outputs.value }} docker compose \
              -f docker/docker-compose.yml \
              -f docker/docker-compose.prod.yml \
              up -d --no-build

            echo "Aguardando health check..."
            timeout 90 bash -c 'until curl -sf http://localhost:8080/health/ready; do sleep 5; done'
            echo "Deploy produção concluído."
